name: SeleniumIde CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
    - name: Clone the repository
      uses: actions/checkout@v4

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: dotnet restore SeleniumIDE/SeleniumIde.csproj

    - name: Build
      run: dotnet build SeleniumIDE/SeleniumIde.csproj --no-restore

    - name: Run tests
      run: dotnet test SeleniumIDE/SeleniumIde.csproj --verbosity normal
